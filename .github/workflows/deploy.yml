name: Firebase Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install functions dependencies
        run: cd functions && npm install

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/728729314722/locations/global/workloadIdentityPools/gh-pool-1/providers/gh-provider-1'
          service_account: 'github-actions@asato-tenko-system.iam.gserviceaccount.com'

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,functions --project "asato-tenko-system" --debug
