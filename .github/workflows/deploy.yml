name: Firebase Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install functions dependencies
        run: cd functions && npm install

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Create .env file for functions environment variables
        run: |
          echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" > functions/.env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> functions/.env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> functions/.env
          echo "GAS_API_URL=${{ secrets.GAS_API_URL }}" >> functions/.env
          echo "GAS_API_KEY=${{ secrets.GAS_API_KEY }}" >> functions/.env

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,functions --project "${{ secrets.FIREBASE_PROJECT_ID }}" --force
