<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>ログイン - 点呼システム</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      background: white;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 2rem;
      font-size: 1.8rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #666;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 1rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 1rem;
    }

    button:hover {
      background: #764ba2;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>ログイン</h1>
    <div id="error-msg" class="error"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" id="login-btn">ログイン</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js';

    let auth;

    async function init() {
      try {
        // Firebase Hosting特有の機能：自動でプロジェクト設定を読み込む
        const configResponse = await fetch('/__/firebase/init.json');
        const firebaseConfig = await configResponse.json();

        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);

        // すでにログイン済みならメイン画面へ
        onAuthStateChanged(auth, (user) => {
          if (user) {
            window.location.href = '/index.html';
          }
        });
      } catch (error) {
        console.error("Firebase初期化エラー:", error);
      }
    }

    init();

    // ログインフォームの送信処理
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!auth) return;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('error-msg');
      const loginBtn = document.getElementById('login-btn');

      errorMsg.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'ログイン中...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // 成功時のリダイレクトは onAuthStateChanged が処理
      } catch (error) {
        let message = 'ログインに失敗しました。';
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          message = 'メールアドレスまたはパスワードが間違っています。';
        } else if (error.code === 'auth/too-many-requests') {
          message = 'ログイン試行回数が多すぎます。時間をおいて再試行してください。';
        }
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'ログイン';
      }
    });
  </script>
</body>

</html>
